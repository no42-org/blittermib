name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Install libsmi
        run: |
          sudo apt-get update
          sudo apt-get install -y libsmi2-dev smitools

      - name: Generate (templ)
        run: make generate

      - name: Verify
        run: make verify

      - name: Build
        run: make build

  cross-build:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.0.2
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate (templ)
        run: make generate

      - name: Build for ${{ matrix.os }}/${{ matrix.arch }}
        run: make build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"

  docker:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Build Docker image
        run: make docker-build TAG=blittermib:ci
